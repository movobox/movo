name: Release desktop installers

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform }} installer
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            script: build:win
          - platform: macos
            os: macos-15
            script: build:mac
          - platform: linux
            os: ubuntu-latest
            script: build:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean previous release output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force release -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force upload -ErrorAction SilentlyContinue

      - name: Build production installer
        run: npm run ${{ matrix.script }}

      - name: Normalize installer names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path upload | Out-Null

          if ("${{ matrix.platform }}" -eq "windows") {
            $exe = Get-ChildItem -Path release -Recurse -Filter *.exe | Sort-Object Length -Descending | Select-Object -First 1
            if (-not $exe) { throw "Windows installer was not found." }
            Copy-Item $exe.FullName upload/Movo-Setup-Windows.exe
          }

          if ("${{ matrix.platform }}" -eq "macos") {
            $dmg = Get-ChildItem -Path release -Recurse -Filter *.dmg | Sort-Object Length -Descending | Select-Object -First 1
            if (-not $dmg) { throw "macOS installer was not found." }
            Copy-Item $dmg.FullName upload/Movo-Installer-macOS.dmg
          }

          if ("${{ matrix.platform }}" -eq "linux") {
            $appImage = Get-ChildItem -Path release -Recurse -Filter *.AppImage | Sort-Object Length -Descending | Select-Object -First 1
            $deb = Get-ChildItem -Path release -Recurse -Filter *.deb | Sort-Object Length -Descending | Select-Object -First 1
            if (-not $appImage) { throw "Linux AppImage was not found." }
            if (-not $deb) { throw "Linux deb package was not found." }
            Copy-Item $appImage.FullName upload/Movo-Linux.AppImage
            Copy-Item $deb.FullName upload/Movo-Linux.deb
          }

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
